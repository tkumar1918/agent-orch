name: contract-diff
# Detects breaking contract changes with oasdiff and posts a human-readable changelog.
# A breaking change is allowed to merge ONLY if the same PR adds a handoff with
# breaking: true (so the other team is always notified). Enforced below.

on:
  pull_request:
    paths:
      - "contracts/**"

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install oasdiff
        run: |
          curl -sSfL https://raw.githubusercontent.com/oasdiff/oasdiff/main/install.sh | sh

      - name: Compute base vs head contract diff
        id: diff
        run: |
          git show "origin/${{ github.base_ref }}:contracts/openapi.yaml" > /tmp/base.yaml || cp contracts/openapi.yaml /tmp/base.yaml
          echo "## Contract changelog" >> "$GITHUB_STEP_SUMMARY"
          oasdiff changelog /tmp/base.yaml contracts/openapi.yaml | tee -a "$GITHUB_STEP_SUMMARY"
          if oasdiff breaking /tmp/base.yaml contracts/openapi.yaml --fail-on ERR; then
            echo "breaking=false" >> "$GITHUB_OUTPUT"
          else
            echo "breaking=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Require a breaking handoff when the change is breaking
        if: steps.diff.outputs.breaking == 'true'
        run: |
          echo "Breaking contract change detected — checking PR adds a breaking handoff..."
          added=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- 'handoffs/*.md')
          if [ -z "$added" ]; then
            echo "::error::Breaking contract change but no handoff manifest in this PR."
            exit 1
          fi
          ok=false
          for f in $added; do
            if grep -qE '^breaking:\s*true' "$f"; then ok=true; fi
          done
          if [ "$ok" != true ]; then
            echo "::error::Breaking contract change requires a handoff with 'breaking: true'."
            exit 1
          fi
          echo "OK: breaking change is accompanied by a breaking handoff."
