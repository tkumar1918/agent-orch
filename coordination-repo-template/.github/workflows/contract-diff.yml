name: contract-diff
# Detects breaking contract changes with oasdiff, per project. A breaking change is allowed
# to merge ONLY if the same PR adds a handoff with breaking: true under that project.

on:
  pull_request:
    paths:
      - "projects/*/contracts/**"

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install oasdiff
        run: |
          curl -sSfL https://raw.githubusercontent.com/oasdiff/oasdiff/main/install.sh | sh

      - name: Diff each changed contract and enforce a breaking handoff
        run: |
          base="origin/${{ github.base_ref }}"
          changed=$(git diff --name-only "$base"...HEAD -- 'projects/*/contracts/*.yaml' 'projects/*/contracts/*.yml' || true)
          if [ -z "$changed" ]; then echo "No contract changes."; exit 0; fi
          fail=0
          for f in $changed; do
            project=$(printf '%s' "$f" | cut -d/ -f2)
            echo "## [$project] $f" >> "$GITHUB_STEP_SUMMARY"
            if ! git show "$base:$f" > /tmp/base.yaml 2>/dev/null; then
              echo "new contract (no base version) — skipping diff" | tee -a "$GITHUB_STEP_SUMMARY"
              continue
            fi
            oasdiff changelog /tmp/base.yaml "$f" | tee -a "$GITHUB_STEP_SUMMARY"
            if oasdiff breaking /tmp/base.yaml "$f" --fail-on ERR >/dev/null 2>&1; then
              continue   # non-breaking
            fi
            echo "BREAKING change detected in $project" | tee -a "$GITHUB_STEP_SUMMARY"
            added=$(git diff --name-only "$base"...HEAD -- "projects/$project/handoffs/*.md")
            ok=0
            for h in $added; do
              grep -qE '^breaking:[[:space:]]*true' "$h" && ok=1
            done
            if [ "$ok" != 1 ]; then
              echo "::error::Breaking change in projects/$project/contracts requires a handoff with 'breaking: true' under projects/$project/handoffs/"
              fail=1
            fi
          done
          exit $fail
