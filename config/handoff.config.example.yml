# Project-local handoff config. Lives at <project>/.handoff/config.yml (enroll.sh writes it).
# The skills read the nearest .handoff/config.yml walking up from the cwd — so the agent uses
# the config of whatever project folder it runs in. There is no global config.

role: frontend                  # frontend | backend  (Laptop-1 = frontend, Laptop-2 = backend)
identity: alice                 # the human approving handoffs from this machine

# The neutral third repo both teams can access. The ONLY shared surface.
# ONE repo serves many projects — each lives under projects/<project>/.
coordination_repo: git@github.com:acme/api-coordination.git
coordination_clone: ~/work/api-coordination   # local clone the skills operate in
project: example-app            # which projects/<project>/ this laptop works on

# Path to the contract WITHIN the project dir (projects/<project>/<contract_path>).
contract_path: contracts/openapi.yaml
contract_format: openapi        # openapi | graphql | grpc

# Frontend-only: where the generated typed client lands.
client_types_out: src/api/types.ts
